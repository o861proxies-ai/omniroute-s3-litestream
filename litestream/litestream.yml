dbs:
  - path: /app/data/storage.sqlite
    replicas: # ✅ PHẢI là "replicas" (array), không phải "replica"
      - type: s3
        name: supabase # Đặt tên để dễ reference
        bucket: ${LITESTREAM_BUCKET}
        path: storage
        endpoint: ${SUPABASE_PROJECT_REF}.supabase.co/storage/v1/s3
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        force-path-style: true
        sign-payload: true
        region: ap-southeast-1
        # Sync interval (default 1s) — tăng lên để giảm request count nếu cần
        # sync-interval: 10s
        # Retention: giữ snapshot bao lâu (default: không xóa)
        # retention: 24h
