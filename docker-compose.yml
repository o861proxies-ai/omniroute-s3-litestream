##############################################################
# docker-compose.yml — Production (Cloudflare Proxy)
# SSL/HTTPS do Cloudflare xu ly — khong can Traefik
##############################################################

services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
    ports:
      - "${OMNIROUTE_PORT:-20128}:${OMNIROUTE_PORT:-20128}"
    volumes:
      - ./data:/app/data
    depends_on:
      litestream:
        condition: service_healthy

  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./litestream/litestream.yml:/etc/litestream.yml:ro
      - ./litestream/startup.sh:/startup.sh:ro
    entrypoint: ["/bin/sh", "/startup.sh"]
    healthcheck:
      test: ["CMD", "litestream", "databases", "-config", "/etc/litestream.yml"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
